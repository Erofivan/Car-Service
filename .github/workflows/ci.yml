name: CI

on:
    push:
        branches:
            - "**"
    pull_request:

permissions:
    contents: read

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    distribution: 'temurin'
                    java-version: '21'
                    cache: 'gradle'

            -   name: Ensure Gradle wrapper is executable
                run: chmod +x ./gradlew

            -   name: Assemble
                run: ./gradlew --no-daemon clean assemble

            -   name: Unit tests
                run: ./gradlew --no-daemon test

            -   name: Integration tests (Testcontainers)
                run: ./gradlew --no-daemon integrationTest

            -   name: Prepare environment for e2e tests
                run: cp .env.example .env

            -   name: End-to-end tests
                run: ./gradlew --no-daemon :e2e-tests:e2eTest
