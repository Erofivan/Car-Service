spring:
    datasource:
        url: jdbc:h2:mem:order_service;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
