global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:8081"]

  - job_name: storage-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["storage-service:8082"]
