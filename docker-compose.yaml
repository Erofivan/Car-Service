services:
    postgres:
        image: postgres:16-alpine
        container_name: erofivan-postgres
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "127.0.0.1:5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 5s
            timeout: 3s
            retries: 5

    keycloak:
        image: quay.io/keycloak/keycloak:26.0
        container_name: erofivan-keycloak
        command: start-dev --import-realm
        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
            KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
        ports:
            - "127.0.0.1:8180:8080"
        volumes:
            - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
        healthcheck:
            test: [ "CMD-SHELL", "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /realms/erofivan/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200' <&3\"" ]
            interval: 10s
            timeout: 5s
            retries: 15
            start_period: 30s

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: erofivan-app
        depends_on:
            postgres:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        ports:
            - "127.0.0.1:8080:8080"
        environment:
            SPRING_PROFILES_ACTIVE: default
            DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
            DB_USERNAME: ${POSTGRES_USER}
            DB_PASSWORD: ${POSTGRES_PASSWORD}
            KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/erofivan
            KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/erofivan/protocol/openid-connect/certs

volumes:
    postgres-data:
