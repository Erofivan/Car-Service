spring:
    datasource:
        url: jdbc:h2:mem:storage_service_it;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
        driver-class-name: org.h2.Driver
        username: sa
        password:
    kafka:
        bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.yaml
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8180/realms/erofivan
                    jwk-set-uri: http://localhost:8180/realms/erofivan/protocol/openid-connect/certs
